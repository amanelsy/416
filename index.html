<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百家樂專業推演系統 - 穩固版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p-blue: #4da6ff; --b-red: #ff4d4d; --t-green: #4dff4d; --gold: #ffd700; }
        body { font-family: -apple-system, system-ui, "Microsoft JhengHei", sans-serif; background-color: #121212; color: #f0f0f0; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 頂部固定區 */
        .header-section { background: #222; padding: 15px 20px; border-bottom: 2px solid var(--p-blue); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .input-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .input-item { flex: 1; min-width: 280px; }
        textarea { width: 100%; height: 55px; background: #1e1e1e; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        .ctrl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 12px; border-radius: 4px; border: 1px solid #555; background: #1e1e1e; color: #fff; font-size: 16px; }
        .btn-main { background: var(--p-blue); color: #000; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; white-space: nowrap; }

        /* 佈局：左 60% 右 40% */
        .main-layout { display: flex; width: 100%; padding: 15px; box-sizing: border-box; gap: 20px; align-items: flex-start; }
        .left-panel { width: 60%; flex-shrink: 0; }
        .right-panel { width: 40%; flex-shrink: 0; position: sticky; top: 185px; height: calc(100vh - 200px); overflow-y: auto; background: #121212; padding-right: 5px; }

        @media (max-width: 950px) and (orientation: portrait) {
            .main-layout { flex-direction: column-reverse; }
            .left-panel, .right-panel { width: 100%; }
            .right-panel { position: sticky; top: 180px; height: auto; border-bottom: 2px solid var(--p-blue); padding-bottom: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        }

        /* 📊 四路圖設計 */
        .road-box { background: #1e1e1e; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .road-title { font-size: 14px; color: #aaa; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px; font-weight: bold; }
        .road-grid { display: flex; overflow-x: auto; gap: 2px; padding-bottom: 8px; min-height: 55px; scroll-behavior: smooth; }
        .road-col { display: flex; flex-direction: column; gap: 2px; }
        
        .br-cell { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; font-size: 12px; font-weight: bold; box-sizing: border-box; }
        .br-red { border: 2.5px solid var(--b-red); }
        .br-blue { border: 2.5px solid var(--p-blue); }
        .br-empty { border: 2.5px solid transparent; }
        .br-tie { position: absolute; width: 110%; height: 3px; background: var(--t-green); transform: rotate(-45deg); z-index: 1; }
        .br-tie-num { position: absolute; z-index: 2; color: var(--t-green); text-shadow: 1px 1px 1px #000; font-size: 14px; font-weight: 900; }
        .bp-dot { position: absolute; top: -2px; left: -2px; width: 8px; height: 8px; background: var(--b-red); border-radius: 50%; border: 1px solid #1e1e1e; }
        .pp-dot { position: absolute; bottom: -2px; right: -2px; width: 8px; height: 8px; background: var(--p-blue); border-radius: 50%; border: 1px solid #1e1e1e; }
        
        .dr-cell { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .be-red { border: 1.5px solid var(--b-red); border-radius: 50%; width: 12px; height: 12px; box-sizing: border-box; }
        .be-blue { border: 1.5px solid var(--p-blue); border-radius: 50%; width: 12px; height: 12px; box-sizing: border-box; }
        .sm-red { background: var(--b-red); border-radius: 50%; width: 10px; height: 10px; }
        .sm-blue { background: var(--p-blue); border-radius: 50%; width: 10px; height: 10px; }
        .ck-red { width: 2px; height: 12px; background: var(--b-red); transform: rotate(45deg); }
        .ck-blue { width: 2px; height: 12px; background: var(--p-blue); transform: rotate(-45deg); }

        /* 💡 動畫修復：純粹外發光，保證不蓋掉顏色 */
        @keyframes flashNormal { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); transform: scale(1); } 
            50% { box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.8); transform: scale(1.15); } 
        }
        @keyframes flashPreview { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); transform: scale(1); } 
            50% { box-shadow: 0 0 15px 5px rgba(255, 170, 0, 1); transform: scale(1.25); } 
        }
        .flash-normal { animation: flashNormal 0.8s infinite !important; z-index: 10; position: relative; }
        .flash-preview { animation: flashPreview 0.6s infinite !important; z-index: 10; position: relative; }

        /* 左側文字清單 */
        .round-item { background: #252525; padding: 15px; border-radius: 6px; margin-bottom: 10px; border-left: 5px solid transparent; transition: 0.3s; }
        .active { background: #1e3320; border-left-color: var(--t-green); transform: scale(1.02); box-shadow: 0 0 15px rgba(77, 255, 77, 0.2); }
        .history { opacity: 0.35; }
        .round-text { font-size: 17px; margin-bottom: 10px; letter-spacing: 0.5px; }
        
        .banker-win { color: var(--b-red); font-weight: bold; }
        .player-win { color: var(--p-blue); font-weight: bold; }
        .tie-win { color: var(--t-green); font-weight: bold; }
        .tag { color: var(--gold); font-size: 14px; margin-left: 8px; background: #333; padding: 2px 6px; border-radius: 3px; }

        .btn-end { background: var(--t-green); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .btn-swap { background: transparent; border: 1px solid #ffaa00; color: #ffaa00; padding: 8px 12px; border-radius: 4px; font-size: 14px; margin-right: 10px; margin-top: 8px; cursor: pointer; user-select: none; transition: 0.1s; }
        .btn-swap:hover { background: #ffaa00; color: #000; font-weight: bold; }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="input-row">
        <div class="input-item">
            <label style="color:#aaa; font-size:12px; font-weight:bold;">資料輸入 (貼上內容或上傳檔案)：</label>
            <textarea id="rawInput" placeholder="直接複製 Excel 貼上 (系統會自動過濾無關文字)"></textarea>
        </div>
        <div class="input-item">
            <label style="color:#aaa; font-size:12px; font-weight:bold;">上傳檔案：</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
        </div>
    </div>
    <div class="ctrl-row">
        <input type="text" id="searchInput" placeholder="輸入 4 碼 (可打亂順序，支援空格/逗號/斜線/橫線)">
        <button class="btn-main" onclick="startAnalysis()">開始搜尋與推演</button>
    </div>
    <div id="matchSelectorGroup" style="display:none; margin-top: 10px;">
        <label style="color:#ffaa00; font-size:13px; font-weight:bold;">⚠️ 找到多組相符序列，請依據「第5、6張」確認真實起點：</label>
        <div style="display:flex; gap:10px; margin-top:5px;">
            <select id="matchSelector" style="flex:1; padding:10px; background:#1e1e1e; color:#fff; border:1px solid #ffaa00; border-radius:4px; font-size:15px;"></select>
            <button class="btn-main" style="background:#ffaa00;" onclick="confirmSelection()">確定起點</button>
        </div>
    </div>
</div>

<div class="main-layout">
    <div class="left-panel" id="listArea"></div>
    <div class="right-panel" id="roadmapArea"></div>
</div>
